<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Locations</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; }

    nav { background: #1565c0; display: flex; gap: 4px; padding: 0 16px; flex-wrap: wrap; }
    nav a { color: #fff; text-decoration: none; padding: 14px 20px; font-size: 0.95rem; opacity: 0.75; display: block; }
    nav a:hover { opacity: 1; background: rgba(255,255,255,0.1); }
    nav a.active { opacity: 1; border-bottom: 3px solid #fff; font-weight: 600; }

    .page-wrap { padding: 24px; }

    /* Header */
    .page-header {
      display: flex; align-items: center; flex-wrap: wrap; gap: 10px;
      background: #fff; border: 1px solid #e0e0e0; border-radius: 10px;
      padding: 14px 18px; margin-bottom: 16px;
    }
    .header-title { display: flex; align-items: center; gap: 8px; margin-right: auto; }
    .header-title h1 { font-size: 1.15rem; color: #222; }
    .count-badge { background: #e3f2fd; color: #1565c0; font-size: 0.75rem; font-weight: 700; padding: 2px 10px; border-radius: 10px; }
    .search-input {
      padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px;
      font-size: 0.9rem; width: 180px;
    }
    .search-input:focus { outline: none; border-color: #1976d2; }
    .filter-select {
      padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px;
      font-size: 0.88rem; background: #fff; cursor: pointer;
    }
    .btn-new {
      padding: 9px 18px; background: #1976d2; color: #fff; border: none;
      border-radius: 6px; font-size: 0.9rem; cursor: pointer; font-weight: 600;
      white-space: nowrap; touch-action: manipulation;
    }
    .btn-new:hover { background: #1565c0; }

    /* Table */
    .table-wrap { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    thead th {
      padding: 11px 14px; text-align: left; font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em; color: #888;
      background: #fafafa; border-bottom: 1px solid #e0e0e0;
    }
    tbody td { padding: 13px 14px; border-bottom: 1px solid #f0f0f0; color: #333; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #f9f9f9; }
    .code-cell { font-weight: 700; color: #1565c0; font-family: monospace; }

    .type-badge {
      display: inline-block; padding: 3px 10px; border-radius: 12px;
      font-size: 0.72rem; font-weight: 600;
    }
    .type-Warehouse       { background: #e3f2fd; color: #1565c0; }
    .type-Production      { background: #fff3e0; color: #e65100; }
    .type-Storage         { background: #e8f5e9; color: #2e7d32; }
    .type-Receiving       { background: #f3e5f5; color: #6a1b9a; }
    .type-Office          { background: #fce4ec; color: #880e4f; }
    .type-default         { background: #f5f5f5; color: #666; }

    .status-active   { color: #2e7d32; font-weight: 600; }
    .status-inactive { color: #9e9e9e; }

    .coord-text { font-family: monospace; font-size: 0.78rem; color: #777; }
    .no-coord   { color: #ccc; font-size: 0.78rem; }

    .btn-edit {
      padding: 5px 14px; background: #fff; border: 1px solid #90caf9;
      border-radius: 5px; font-size: 0.82rem; color: #1565c0; cursor: pointer;
      margin-right: 4px;
    }
    .btn-edit:hover { background: #e3f2fd; }
    .btn-del {
      padding: 5px 14px; background: #fff; border: 1px solid #ef9a9a;
      border-radius: 5px; font-size: 0.82rem; color: #c62828; cursor: pointer;
    }
    .btn-del:hover { background: #ffebee; }

    /* Pagination */
    .pagination { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-top: 1px solid #f0f0f0; }
    .page-info { font-size: 0.82rem; color: #888; }
    .page-btns { display: flex; gap: 4px; }
    .page-btn {
      min-width: 32px; height: 32px; padding: 0 8px; border: 1px solid #e0e0e0;
      border-radius: 5px; background: #fff; font-size: 0.82rem; cursor: pointer; color: #555;
    }
    .page-btn:hover { background: #f0f0f0; }
    .page-btn.active { background: #1976d2; color: #fff; border-color: #1976d2; font-weight: 700; }
    .page-btn:disabled { opacity: 0.4; cursor: default; }

    /* Empty */
    .empty-row td { text-align: center; padding: 48px; color: #bbb; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100;
      display: none; align-items: center; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal-box {
      background: #fff; border-radius: 14px; padding: 28px 28px 22px;
      width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto;
      box-shadow: 0 16px 48px rgba(0,0,0,0.2);
      animation: slideUp 0.2s ease;
    }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-title { font-size: 1.1rem; font-weight: 700; color: #222; margin-bottom: 20px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 0.82rem; font-weight: 600; color: #555; margin-bottom: 5px; }
    .form-group input, .form-group select {
      width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 6px;
      font-size: 0.95rem; background: #fff;
    }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: #1976d2; box-shadow: 0 0 0 2px rgba(25,118,210,0.12); }
    .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .latlng-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; align-items: end; margin-bottom: 14px; }
    .btn-get-loc {
      padding: 9px 12px; background: #f5f5f5; border: 1px solid #ddd;
      border-radius: 6px; font-size: 0.82rem; cursor: pointer; color: #555;
      white-space: nowrap; touch-action: manipulation;
    }
    .btn-get-loc:hover { background: #e8e8e8; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .btn-save {
      flex: 1; padding: 10px; background: #1976d2; color: #fff;
      border: none; border-radius: 6px; font-size: 0.95rem; cursor: pointer; font-weight: 600;
    }
    .btn-save:hover { background: #1565c0; }
    .btn-save:disabled { background: #90caf9; cursor: default; }
    .btn-cancel {
      padding: 10px 20px; background: #f5f5f5; border: 1px solid #ddd;
      border-radius: 6px; font-size: 0.95rem; cursor: pointer; color: #555;
    }
    .btn-cancel:hover { background: #e8e8e8; }
    .modal-err { font-size: 0.82rem; color: #c62828; margin-top: 8px; display: none; }
  </style>
</head>
<body>
  <nav>
    <a href="/">ZPL Label Preview</a>
    <a href="/generate-qr.html">Generate New QR</a>
    <a href="/receive.html">Receive</a>
    <a href="/move.html">Move</a>
    <a href="/dashboard.html">Dashboard</a>
    <a href="/location.html" class="active">Location</a>
  </nav>

  <div class="page-wrap">
    <div class="page-header">
      <div class="header-title">
        <span style="font-size:1.3rem">📍</span>
        <h1>Locations</h1>
        <span class="count-badge" id="countBadge">0 items</span>
      </div>
      <input class="search-input" id="searchInput" placeholder="Search Code..." />
      <select class="filter-select" id="typeFilter">
        <option value="">All Types</option>
        <option>Warehouse</option>
        <option>Production Line</option>
        <option>Storage</option>
        <option>Receiving Area</option>
        <option>Office</option>
      </select>
      <select class="filter-select" id="statusFilter">
        <option value="">All Status</option>
        <option>Active</option>
        <option>Inactive</option>
      </select>
      <button class="btn-new" id="btnNew">+ New Location</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Code</th>
            <th>Description</th>
            <th>Type</th>
            <th>Latitude</th>
            <th>Longitude</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr class="empty-row"><td colspan="7">กำลังโหลด...</td></tr>
        </tbody>
      </table>
      <div class="pagination">
        <span class="page-info" id="pageInfo"></span>
        <div class="page-btns" id="pageBtns"></div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal-box">
      <div class="modal-title" id="modalTitle">New Location</div>
      <div class="form-row-2">
        <div class="form-group">
          <label>Code *</label>
          <input type="text" id="fCode" placeholder="เช่น AHF_01" style="text-transform:uppercase" />
        </div>
        <div class="form-group">
          <label>Type</label>
          <select id="fType">
            <option value="">— เลือก Type —</option>
            <option>Warehouse</option>
            <option>Production Line</option>
            <option>Storage</option>
            <option>Receiving Area</option>
            <option>Office</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Description</label>
        <input type="text" id="fDesc" placeholder="เช่น No.15" />
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="fStatus">
          <option>Active</option>
          <option>Inactive</option>
        </select>
      </div>

      <div style="font-size:0.82rem; font-weight:600; color:#555; margin-bottom:8px">
        Coordinates
        <button class="btn-get-loc" id="btnGetLoc" style="margin-left:8px">📍 Get Current Location</button>
      </div>
      <div class="latlng-group">
        <div class="form-group" style="margin-bottom:0">
          <label>Latitude</label>
          <input type="number" id="fLat" placeholder="เช่น 13.736717" step="any" />
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label>Longitude</label>
          <input type="number" id="fLng" placeholder="เช่น 100.523186" step="any" />
        </div>
      </div>

      <div class="modal-err" id="modalErr"></div>
      <div class="modal-actions">
        <button class="btn-save" id="btnSave">Save</button>
        <button class="btn-cancel" id="btnCancel">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    const PAGE_SIZE = 15;
    let allLocations = [];
    let filtered = [];
    let currentPage = 1;
    let editId = null;

    // ── Load ──────────────────────────────────────────────
    async function loadLocations() {
      try {
        const res = await fetch('/api/locations');
        allLocations = await res.json();
        applyFilters();
      } catch {
        document.getElementById('tableBody').innerHTML =
          '<tr class="empty-row"><td colspan="7">โหลดข้อมูลไม่ได้</td></tr>';
      }
    }

    // ── Filter ────────────────────────────────────────────
    function applyFilters() {
      const search = document.getElementById('searchInput').value.trim().toLowerCase();
      const type   = document.getElementById('typeFilter').value;
      const status = document.getElementById('statusFilter').value;
      filtered = allLocations.filter(l =>
        (!search || l.code.toLowerCase().includes(search) || l.description.toLowerCase().includes(search)) &&
        (!type   || l.type === type) &&
        (!status || l.status === status)
      );
      document.getElementById('countBadge').textContent = `${filtered.length} items`;
      currentPage = 1;
      renderTable();
    }

    ['searchInput','typeFilter','statusFilter'].forEach(id =>
      document.getElementById(id).addEventListener('input', applyFilters)
    );

    // ── Render ────────────────────────────────────────────
    function renderTable() {
      const tbody = document.getElementById('tableBody');
      const start = (currentPage - 1) * PAGE_SIZE;
      const page  = filtered.slice(start, start + PAGE_SIZE);

      if (filtered.length === 0) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="7">ไม่พบข้อมูล</td></tr>';
        document.getElementById('pageInfo').textContent = '';
        document.getElementById('pageBtns').innerHTML = '';
        return;
      }

      tbody.innerHTML = page.map(l => {
        const typeClass = ['Warehouse','Production','Storage','Receiving','Office']
          .find(t => l.type.startsWith(t)) || 'default';
        const lat = l.latitude  != null ? `<span class="coord-text">${l.latitude.toFixed(6)}</span>`  : '<span class="no-coord">—</span>';
        const lng = l.longitude != null ? `<span class="coord-text">${l.longitude.toFixed(6)}</span>` : '<span class="no-coord">—</span>';
        return `<tr>
          <td><span class="code-cell">${escHtml(l.code)}</span></td>
          <td>${escHtml(l.description)}</td>
          <td><span class="type-badge type-${typeClass}">${escHtml(l.type) || '—'}</span></td>
          <td>${lat}</td>
          <td>${lng}</td>
          <td><span class="status-${l.status === 'Active' ? 'active' : 'inactive'}">${l.status}</span></td>
          <td>
            <button class="btn-edit" onclick="openEdit(${l.id})">Edit</button>
            <button class="btn-del"  onclick="deleteLocation(${l.id})">Delete</button>
          </td>
        </tr>`;
      }).join('');

      const total = filtered.length;
      const pages = Math.ceil(total / PAGE_SIZE);
      document.getElementById('pageInfo').textContent =
        `Page ${currentPage} of ${pages} (${total} items)`;

      // Page buttons
      const btns = document.getElementById('pageBtns');
      btns.innerHTML = '';
      const addBtn = (label, page, disabled = false) => {
        const b = document.createElement('button');
        b.className = 'page-btn' + (page === currentPage ? ' active' : '');
        b.textContent = label;
        b.disabled = disabled;
        b.onclick = () => { currentPage = page; renderTable(); };
        btns.appendChild(b);
      };
      addBtn('←', currentPage - 1, currentPage === 1);
      const start2 = Math.max(1, currentPage - 2);
      const end2   = Math.min(pages, start2 + 4);
      for (let p = start2; p <= end2; p++) addBtn(p, p);
      addBtn('→', currentPage + 1, currentPage === pages);
    }

    // ── Modal ─────────────────────────────────────────────
    document.getElementById('btnNew').onclick = () => openCreate();
    document.getElementById('btnCancel').onclick = closeModal;
    document.getElementById('modal').addEventListener('click', e => {
      if (e.target === document.getElementById('modal')) closeModal();
    });

    function openCreate() {
      editId = null;
      document.getElementById('modalTitle').textContent = 'New Location';
      ['fCode','fDesc','fLat','fLng'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('fType').value = '';
      document.getElementById('fStatus').value = 'Active';
      document.getElementById('modalErr').style.display = 'none';
      document.getElementById('modal').classList.add('show');
    }

    function openEdit(id) {
      const loc = allLocations.find(l => l.id === id);
      if (!loc) return;
      editId = id;
      document.getElementById('modalTitle').textContent = `Edit: ${loc.code}`;
      document.getElementById('fCode').value   = loc.code;
      document.getElementById('fDesc').value   = loc.description;
      document.getElementById('fType').value   = loc.type;
      document.getElementById('fStatus').value = loc.status;
      document.getElementById('fLat').value    = loc.latitude  ?? '';
      document.getElementById('fLng').value    = loc.longitude ?? '';
      document.getElementById('modalErr').style.display = 'none';
      document.getElementById('modal').classList.add('show');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('show');
    }

    // ── Save ──────────────────────────────────────────────
    document.getElementById('btnSave').onclick = async () => {
      const code = document.getElementById('fCode').value.trim().toUpperCase();
      const err  = document.getElementById('modalErr');
      if (!code) { err.textContent = 'กรุณาใส่ Code'; err.style.display = 'block'; return; }

      const body = {
        code,
        description: document.getElementById('fDesc').value.trim(),
        type:        document.getElementById('fType').value,
        status:      document.getElementById('fStatus').value,
        latitude:    document.getElementById('fLat').value !== '' ? +document.getElementById('fLat').value : null,
        longitude:   document.getElementById('fLng').value !== '' ? +document.getElementById('fLng').value : null,
      };

      const btn = document.getElementById('btnSave');
      btn.disabled = true; btn.textContent = 'Saving...';
      try {
        const url    = editId ? `/api/locations/${editId}` : '/api/locations';
        const method = editId ? 'PUT' : 'POST';
        const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        if (!res.ok) throw new Error(await res.text());
        const saved = await res.json();
        if (editId) {
          const i = allLocations.findIndex(l => l.id === editId);
          if (i >= 0) allLocations[i] = saved;
        } else {
          allLocations.push(saved);
          allLocations.sort((a, b) => a.code.localeCompare(b.code));
        }
        applyFilters();
        closeModal();
      } catch (e) {
        err.textContent = 'บันทึกไม่สำเร็จ: ' + e.message;
        err.style.display = 'block';
      } finally {
        btn.disabled = false; btn.textContent = 'Save';
      }
    };

    // ── Delete ────────────────────────────────────────────
    async function deleteLocation(id) {
      const loc = allLocations.find(l => l.id === id);
      if (!loc || !confirm(`ลบ ${loc.code}?`)) return;
      try {
        await fetch(`/api/locations/${id}`, { method: 'DELETE' });
        allLocations = allLocations.filter(l => l.id !== id);
        applyFilters();
      } catch { alert('ลบไม่สำเร็จ'); }
    }

    // ── Get Location ──────────────────────────────────────
    document.getElementById('btnGetLoc').onclick = () => {
      if (!navigator.geolocation) { alert('Browser ไม่รองรับ Geolocation'); return; }
      const btn = document.getElementById('btnGetLoc');
      btn.textContent = '⏳ กำลังรับตำแหน่ง...'; btn.disabled = true;
      navigator.geolocation.getCurrentPosition(
        pos => {
          document.getElementById('fLat').value = pos.coords.latitude.toFixed(6);
          document.getElementById('fLng').value = pos.coords.longitude.toFixed(6);
          btn.textContent = '📍 Get Current Location'; btn.disabled = false;
        },
        () => { btn.textContent = '📍 Get Current Location'; btn.disabled = false; alert('ไม่สามารถรับตำแหน่งได้'); },
        { enableHighAccuracy: false, timeout: 30000 }
      );
    };

    function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    loadLocations();
  </script>
</body>
</html>
