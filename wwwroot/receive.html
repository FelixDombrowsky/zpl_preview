<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Receive</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; }
    nav { background: #1565c0; display: flex; gap: 4px; padding: 0 16px; flex-wrap: wrap; }
    nav a { color: #fff; text-decoration: none; padding: 14px 20px; font-size: 0.95rem; opacity: 0.75; display: block; }
    nav a:hover { opacity: 1; background: rgba(255,255,255,0.1); }
    nav a.active { opacity: 1; border-bottom: 3px solid #fff; font-weight: 600; }

    .content { padding: 24px; max-width: 560px; }
    h1 { font-size: 1.4rem; color: #333; margin-bottom: 6px; }
    .subtitle { font-size: 0.88rem; color: #999; margin-bottom: 28px; }

    .loc-card {
      background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 24px;
    }
    .loc-card h2 { font-size: 1rem; color: #333; margin-bottom: 16px; }

    .method-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .method-btn {
      padding: 14px 12px; border: 2px solid #e0e0e0; border-radius: 10px;
      background: #fff; cursor: pointer; touch-action: manipulation;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      transition: border-color 0.15s, background 0.15s;
    }
    .method-btn:hover { border-color: #90caf9; background: #f5f9ff; }
    .method-btn.selected { border-color: #1976d2; background: #e3f2fd; }
    .method-btn:disabled { opacity: 0.45; cursor: default; }
    .method-icon { font-size: 1.8rem; }
    .method-name { font-size: 0.88rem; font-weight: 700; color: #333; }
    .method-desc { font-size: 0.72rem; color: #888; text-align: center; }

    button.btn-primary {
      padding: 12px 26px; border: none; border-radius: 8px;
      font-size: 1rem; cursor: pointer; touch-action: manipulation;
      display: inline-flex; align-items: center; gap: 8px;
      background: #1976d2; color: #fff;
    }
    .btn-primary:hover { background: #1565c0; }
    .btn-primary:disabled { background: #90caf9; cursor: default; }

    #locStatus { margin-top: 16px; padding: 12px 14px; border-radius: 8px; font-size: 0.88rem; display: none; }
    #locStatus.loading { background: #fff8e1; border: 1px solid #ffe082; color: #f57f17; }
    #locStatus.success { background: #e8f5e9; border: 1px solid #a5d6a7; color: #2e7d32; }
    #locStatus.error   { background: #ffebee; border: 1px solid #ef9a9a; color: #c62828; }

    .coord-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
    .coord-item { background: #f5f5f5; border-radius: 8px; padding: 10px 12px; }
    .coord-label { font-size: 0.72rem; color: #999; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; }
    .coord-val { font-family: monospace; font-size: 0.9rem; color: #333; font-weight: 600; }
  </style>
</head>
<body>
  <nav>
    <a href="/">ZPL Label Preview</a>
    <a href="/generate-qr.html">Generate New QR</a>
    <a href="/receive.html" class="active">Receive</a>
    <a href="/move.html">Move</a>
    <a href="/dashboard.html">Dashboard</a>
    <a href="/location.html">Location</a>
  </nav>

  <div class="content">
    <h1>Receive</h1>
    <p class="subtitle">บันทึกตำแหน่งของ user ขณะทำรายการ Receive</p>

    <div class="loc-card">
      <h2>📍 ตำแหน่งของคุณ</h2>

      <div class="method-grid">
        <button class="method-btn selected" id="methodWifi" data-method="wifi">
          <span class="method-icon">📶</span>
          <span class="method-name">WiFi / Network</span>
          <span class="method-desc">เร็ว · ต้องการ internet<br>แม่น ±50–200 m</span>
        </button>
        <button class="method-btn" id="methodGps" data-method="gps">
          <span class="method-icon">🛰️</span>
          <span class="method-name">GPS Device</span>
          <span class="method-desc">ไม่ต้องการ internet<br>แม่น ±5–20 m (ช้า)</span>
        </button>
      </div>

      <button class="btn-primary" id="btnGetLocation">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><circle cx="12" cy="12" r="9" stroke-dasharray="4 2"/></svg>
        Get My Location
      </button>

      <div id="locStatus"></div>

      <div id="coordGrid" class="coord-grid" style="display:none">
        <div class="coord-item"><div class="coord-label">Latitude</div><div class="coord-val" id="valLat">—</div></div>
        <div class="coord-item"><div class="coord-label">Longitude</div><div class="coord-val" id="valLng">—</div></div>
        <div class="coord-item"><div class="coord-label">Accuracy</div><div class="coord-val" id="valAcc">—</div></div>
        <div class="coord-item"><div class="coord-label">Logged At</div><div class="coord-val" id="valTime">—</div></div>
      </div>
    </div>
  </div>

  <script>
    let selectedMethod = 'wifi';

    // Method selector
    document.querySelectorAll('.method-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedMethod = btn.dataset.method;
      });
    });

    document.getElementById('btnGetLocation').addEventListener('click', () => {
      if (!navigator.geolocation) {
        showStatus('error', 'Browser นี้ไม่รองรับ Geolocation');
        return;
      }
      const btn = document.getElementById('btnGetLocation');
      const isGps = selectedMethod === 'gps';
      btn.disabled = true;
      document.querySelectorAll('.method-btn').forEach(b => b.disabled = true);
      document.getElementById('coordGrid').style.display = 'none';
      showStatus('loading', isGps
        ? '🛰️ กำลังรับสัญญาณ GPS... (อาจใช้เวลา 30-60 วิ)'
        : '📶 กำลังระบุตำแหน่งจาก WiFi...');

      const options = isGps
        ? { enableHighAccuracy: true,  timeout: 60000, maximumAge: 0 }
        : { enableHighAccuracy: false, timeout: 30000, maximumAge: 60000 };

      navigator.geolocation.getCurrentPosition(
        async pos => {
          const { latitude, longitude, accuracy } = pos.coords;
          document.getElementById('valLat').textContent  = latitude.toFixed(6);
          document.getElementById('valLng').textContent  = longitude.toFixed(6);
          document.getElementById('valAcc').textContent  = `±${Math.round(accuracy)} m`;
          document.getElementById('valTime').textContent = new Date().toLocaleTimeString('th-TH');
          document.getElementById('coordGrid').style.display = 'grid';

          try {
            await fetch('/api/locationlogs', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ latitude, longitude, accuracy, action: 'receive', method: selectedMethod })
            });
            showStatus('success', `✓ บันทึกสำเร็จ (${isGps ? 'GPS' : 'WiFi'})`);
          } catch {
            showStatus('error', 'ได้ตำแหน่งแล้ว แต่บันทึกลง server ไม่ได้');
          }
          btn.disabled = false;
          document.querySelectorAll('.method-btn').forEach(b => b.disabled = false);
        },
        err => {
          const msgs = {
            1: 'Permission ถูกปฏิเสธ — กรุณาอนุญาต Location ใน browser setting',
            2: isGps ? 'รับสัญญาณ GPS ไม่ได้ — ลองย้ายไปใกล้หน้าต่างหรือใช้ WiFi แทน'
                     : 'ระบุตำแหน่งไม่ได้ — network อาจไม่มี internet ลอง GPS แทน',
            3: isGps ? 'GPS timeout — ลองอีกครั้งหรือเปลี่ยนเป็น WiFi'
                     : 'WiFi timeout — network อาจไม่มี internet ลอง GPS แทน'
          };
          showStatus('error', msgs[err.code] || err.message);
          btn.disabled = false;
          document.querySelectorAll('.method-btn').forEach(b => b.disabled = false);
        },
        options
      );
    });

    function showStatus(type, msg) {
      const el = document.getElementById('locStatus');
      el.className = type; el.textContent = msg; el.style.display = 'block';
    }
  </script>
</body>
</html>
